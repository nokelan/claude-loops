<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>SI Test Sample App</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f5f5f5; }
    .container { max-width: 800px; margin: 40px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h2 { color: #333; border-bottom: 2px solid #007bff; padding-bottom: 8px; }
    input, select { width: 100%; padding: 8px; margin: 6px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin: 4px; }
    .btn-primary { background: #007bff; color: white; }
    .btn-danger { background: #dc3545; color: white; }
    .btn-secondary { background: #6c757d; color: white; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    th { background: #007bff; color: white; }
    .item-row:hover { background: #f0f8ff; }
    .error { color: red; font-size: 13px; }
    .success { color: green; font-size: 13px; }
    nav { background: #007bff; padding: 10px 20px; }
    nav a { color: white; text-decoration: none; margin-right: 16px; font-weight: bold; }
    nav a:hover { text-decoration: underline; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; }
    .modal.active { display: flex; align-items: center; justify-content: center; }
    .modal-box { background: white; padding: 24px; border-radius: 8px; width: 400px; }
    .form-group { margin-bottom: 12px; }
    label { font-weight: bold; display: block; margin-bottom: 4px; }
  </style>
</head>
<body>
<script>
  // 심플 해시 라우터 (#/login, #/list 등)
  const routes = {
    '#/login': showLogin,
    '#/dashboard': showDashboard,
    '#/list': showList,
    '#/register': showRegister,
    '#/detail': showDetail,
    '': showLogin,
  };

  let currentUser = null;
  const sampleData = [
    { id: 1, name: '홍길동', dept: '개발팀', status: '재직' },
    { id: 2, name: '김철수', dept: '기획팀', status: '재직' },
    { id: 3, name: '이영희', dept: '디자인팀', status: '휴직' },
    { id: 4, name: '박민준', dept: '개발팀', status: '재직' },
    { id: 5, name: '최수진', dept: '영업팀', status: '재직' },
  ];

  function navigate(hash) {
    window.location.hash = hash;
  }

  function render() {
    const hash = window.location.hash || '';
    const fn = routes[hash] || showLogin;
    fn();
  }

  function showLogin() {
    document.body.innerHTML = `
      <div class="container">
        <h2>로그인</h2>
        <div class="form-group">
          <label>아이디</label>
          <input type="text" id="username" placeholder="아이디 입력" />
        </div>
        <div class="form-group">
          <label>비밀번호</label>
          <input type="password" id="password" placeholder="비밀번호 입력" />
        </div>
        <div id="login-error" class="error"></div>
        <button class="btn-primary" id="btn-login" onclick="doLogin()">로그인</button>
      </div>`;
  }

  function doLogin() {
    const u = document.getElementById('username').value;
    const p = document.getElementById('password').value;
    if (u === 'admin' && p === '1234') {
      currentUser = u;
      navigate('#/dashboard');
    } else {
      document.getElementById('login-error').textContent = '아이디 또는 비밀번호가 틀렸습니다.';
    }
  }

  function showDashboard() {
    document.body.innerHTML = `
      <nav>
        <a href="#" onclick="navigate('#/dashboard')">홈</a>
        <a href="#" onclick="navigate('#/list')">목록</a>
        <a href="#" onclick="navigate('#/register')">등록</a>
        <a href="#" onclick="navigate('#/login')" style="float:right">로그아웃</a>
      </nav>
      <div class="container">
        <h2>대시보드</h2>
        <p id="welcome-msg">환영합니다, ${currentUser || '사용자'}님!</p>
        <div style="display:flex; gap:16px; margin-top:20px;">
          <div style="flex:1; background:#e3f2fd; padding:20px; border-radius:8px; text-align:center;">
            <div style="font-size:32px; font-weight:bold; color:#1976d2" id="total-count">${sampleData.length}</div>
            <div>전체 직원</div>
          </div>
          <div style="flex:1; background:#e8f5e9; padding:20px; border-radius:8px; text-align:center;">
            <div style="font-size:32px; font-weight:bold; color:#388e3c" id="active-count">${sampleData.filter(d=>d.status==='재직').length}</div>
            <div>재직 중</div>
          </div>
        </div>
        <button class="btn-primary" style="margin-top:20px" onclick="navigate('#/list')">목록 보기</button>
      </div>`;
  }

  function showList() {
    let filtered = [...sampleData];
    document.body.innerHTML = `
      <nav>
        <a href="#" onclick="navigate('#/dashboard')">홈</a>
        <a href="#" onclick="navigate('#/list')">목록</a>
        <a href="#" onclick="navigate('#/register')">등록</a>
      </nav>
      <div class="container">
        <h2>직원 목록</h2>
        <div style="display:flex; gap:8px; margin-bottom:12px;">
          <input type="text" id="search-name" placeholder="이름 검색" style="flex:1" />
          <button class="btn-primary" id="btn-search" onclick="doSearch()">검색</button>
        </div>
        <table id="list-table">
          <thead><tr><th>번호</th><th>이름</th><th>부서</th><th>상태</th><th>액션</th></tr></thead>
          <tbody id="list-body">${renderRows(filtered)}</tbody>
        </table>
        <div style="margin-top:12px">
          <button class="btn-primary" onclick="navigate('#/register')">신규 등록</button>
        </div>
      </div>`;
  }

  function doSearch() {
    const keyword = document.getElementById('search-name').value;
    const filtered = sampleData.filter(d => d.name.includes(keyword));
    document.getElementById('list-body').innerHTML = renderRows(filtered);
  }

  function renderRows(data) {
    return data.map(d => `
      <tr class="item-row">
        <td>${d.id}</td>
        <td>${d.name}</td>
        <td>${d.dept}</td>
        <td>${d.status}</td>
        <td>
          <button class="btn-secondary" onclick="viewDetail(${d.id})">상세</button>
          <button class="btn-danger" id="btn-delete-${d.id}" onclick="confirmDelete(${d.id})">삭제</button>
        </td>
      </tr>`).join('');
  }

  function viewDetail(id) {
    const item = sampleData.find(d => d.id === id);
    if (item) {
      sessionStorage.setItem('detail', JSON.stringify(item));
      navigate('#/detail');
    }
  }

  function showDetail() {
    const item = JSON.parse(sessionStorage.getItem('detail') || '{}');
    document.body.innerHTML = `
      <nav>
        <a href="#" onclick="navigate('#/dashboard')">홈</a>
        <a href="#" onclick="navigate('#/list')">목록</a>
        <a href="#" onclick="navigate('#/register')">등록</a>
      </nav>
      <div class="container">
        <h2>직원 상세</h2>
        <table>
          <tr><th>번호</th><td id="detail-id">${item.id || '-'}</td></tr>
          <tr><th>이름</th><td id="detail-name">${item.name || '-'}</td></tr>
          <tr><th>부서</th><td id="detail-dept">${item.dept || '-'}</td></tr>
          <tr><th>상태</th><td id="detail-status">${item.status || '-'}</td></tr>
        </table>
        <button class="btn-secondary" style="margin-top:16px" onclick="navigate('#/list')">목록으로</button>
      </div>`;
  }

  function showRegister() {
    document.body.innerHTML = `
      <nav>
        <a href="#" onclick="navigate('#/dashboard')">홈</a>
        <a href="#" onclick="navigate('#/list')">목록</a>
        <a href="#" onclick="navigate('#/register')">등록</a>
      </nav>
      <div class="container">
        <h2>직원 등록</h2>
        <div class="form-group">
          <label>이름</label>
          <input type="text" id="reg-name" placeholder="이름 입력" />
        </div>
        <div class="form-group">
          <label>부서</label>
          <select id="reg-dept">
            <option value="">부서 선택</option>
            <option>개발팀</option><option>기획팀</option>
            <option>디자인팀</option><option>영업팀</option>
          </select>
        </div>
        <div id="reg-error" class="error"></div>
        <div id="reg-success" class="success"></div>
        <button class="btn-primary" id="btn-save" onclick="doRegister()">저장</button>
        <button class="btn-secondary" onclick="navigate('#/list')">취소</button>
      </div>`;
  }

  function doRegister() {
    const name = document.getElementById('reg-name').value;
    const dept = document.getElementById('reg-dept').value;
    if (!name || !dept) {
      document.getElementById('reg-error').textContent = '이름과 부서를 입력해주세요.';
      return;
    }
    sampleData.push({ id: sampleData.length + 1, name, dept, status: '재직' });
    document.getElementById('reg-error').textContent = '';
    document.getElementById('reg-success').textContent = `'${name}' 등록 완료!`;
  }

  function confirmDelete(id) {
    const item = sampleData.find(d => d.id === id);
    const modal = document.createElement('div');
    modal.className = 'modal active';
    modal.id = 'delete-modal';
    modal.innerHTML = `
      <div class="modal-box">
        <h3>삭제 확인</h3>
        <p id="delete-msg">'${item.name}'을(를) 삭제하시겠습니까?</p>
        <button class="btn-danger" id="btn-confirm-delete" onclick="doDelete(${id})">삭제</button>
        <button class="btn-secondary" id="btn-cancel-delete" onclick="document.getElementById('delete-modal').remove()">취소</button>
      </div>`;
    document.body.appendChild(modal);
  }

  function doDelete(id) {
    const idx = sampleData.findIndex(d => d.id === id);
    if (idx > -1) sampleData.splice(idx, 1);
    document.getElementById('delete-modal').remove();
    showList();
  }

  window.addEventListener('hashchange', render);
  render();
</script>
</body>
</html>
